id: invoice_minimal
document_type: invoice
fields:
  - name: invoice_number
    required: true
    patterns:
      - '(?:invoice\s*(?:no|number)?\s*[:#]?\s*)([A-Z0-9\-]{4,})'
  - name: issue_date
    required: false
    patterns:
      - '(?:issue\s*date\s*[:]?\s*)(\d{4}[./-]\d{1,2}[./-]\d{1,2})'
  - name: total_amount
    required: true
    patterns:
      - '(?:total\s*(?:amount)?\s*[:]?\s*)([\$¥€]?\s?[0-9][0-9,]*(?:\.[0-9]{2})?)'
