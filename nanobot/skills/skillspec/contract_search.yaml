meta:
  id: contract_search
  version: "0.1"
  description: Search contracts by vendor, number, and status.
  owner: built_in
  domain: legal_ops
params:
  type: object
  required:
    - query
  properties:
    query:
      type: string
      description: Keyword matching contract number, title, or vendor.
      min_length: 1
    status:
      type: string
      enum:
        - draft
        - active
        - expired
    min_amount:
      type: number
      description: Optional lower bound for contract value.
      minimum: 0
    page_size:
      type: integer
      default: 20
      minimum: 1
      maximum: 100
    page_token:
      type: string
action:
  kind: query
  data_source: bitable
  table:
    app_token: app_contract_ops_001
    table_id: tbl_contract_registry_001
  select_fields:
    - contract_id
    - contract_no
    - title
    - vendor
    - amount
    - status
    - expiry_date
    - owner
  filter_template:
    op: and
    conditions:
      - field: searchable_text
        op: contains
        value: "{{ params.query }}"
      - field: status
        op: eq
        value: "{{ params.status }}"
        when: params.status
      - field: amount
        op: gte
        value: "{{ params.min_amount }}"
        when: params.min_amount
  order_by:
    - field: updated_at
      direction: desc
  pagination_mode: data
response:
  output_policy:
    max_items: 5
    include_total: true
    include_next_page_token: true
  view:
    type: list
    item_template:
      - "{{ row.contract_no }} | {{ row.vendor }}"
      - "status={{ row.status }}, amount={{ row.amount }}, expiry={{ row.expiry_date }}"
error:
  not_found_message: No matching contracts were found.
  upstream_error_message: Contract search is temporarily unavailable.
  retryable: true
