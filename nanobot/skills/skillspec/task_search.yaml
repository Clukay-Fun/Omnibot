meta:
  id: task_search
  version: "0.1"
  description: Search legal ops tasks by case, assignee, and due window.
  owner: built_in
  domain: legal_ops
params:
  type: object
  required:
    - query
  properties:
    query:
      type: string
      description: Keyword matching task title or task description.
      min_length: 1
    assignee:
      type: string
      description: Optional assignee filter.
    due_within_days:
      type: integer
      description: Optional due date horizon in days.
      minimum: 1
      maximum: 120
    status:
      type: string
      enum:
        - todo
        - in_progress
        - blocked
        - done
    page_size:
      type: integer
      default: 20
      minimum: 1
      maximum: 100
    page_token:
      type: string
action:
  kind: query
  data_source: bitable
  table:
    alias: case_tasks
  select_fields:
    - task_id
    - task_title
    - case_id
    - case_no
    - assignee
    - status
    - priority
    - due_date
  filter_template:
    op: and
    conditions:
      - field: searchable_text
        op: contains
        value: "{{ params.query }}"
      - field: assignee
        op: eq
        value: "{{ params.assignee }}"
        when: params.assignee
      - field: due_date
        op: lte_relative_days
        value: "{{ params.due_within_days }}"
        when: params.due_within_days
      - field: status
        op: eq
        value: "{{ params.status }}"
        when: params.status
  order_by:
    - field: due_date
      direction: asc
  pagination_mode: data
response:
  output_policy:
    max_items: 5
    include_total: true
    include_next_page_token: true
  view:
    type: list
    item_template:
      - "{{ row.task_title }} ({{ row.case_no }})"
      - "assignee={{ row.assignee }}, status={{ row.status }}, due={{ row.due_date }}"
error:
  not_found_message: No matching tasks were found.
  upstream_error_message: Task search is temporarily unavailable.
  retryable: true
