meta:
  id: reminder_cancel
  version: "0.1"
  title: Cancel reminder
  description: Cancel an existing reminder by id (record-first runtime).
  owner: built_in
  domain: productivity
  match:
    regex: "(取消提醒|删除提醒|不再提醒)"
    keywords:
      - 取消提醒
      - 删除提醒
      - 不再提醒
params:
  type: object
  required:
    - reminder_id
  properties:
    reminder_id:
      type: string
      description: Reminder id to cancel.
action:
  kind: reminder_cancel
response:
  type: structured
  template: |
    {% if cancelled %}
    已取消提醒 {{ reminder.id }}。
    - 状态: {{ reminder.status }}
    {% else %}
    未取消提醒：{{ reason or reminder_id }}。
    {% endif %}
error:
  code: REMINDER_CANCEL_ERROR
  message: 取消提醒失败，请确认提醒 ID 是否正确。
  retryable: true
