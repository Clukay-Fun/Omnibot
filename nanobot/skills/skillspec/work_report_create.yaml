meta:
  id: work_report_create
  version: "0.1"
  title: Work report to Bitable
  description: Extract work report fields from natural language and write into Bitable.
  owner: built_in
  domain: legal_ops
  match:
    regex: "(工作汇报|日报|周报|今日汇报|今天汇报)"
    keywords:
      - 工作汇报
      - 日报
      - 周报
      - 汇报
params:
  type: object
  properties:
    query:
      type: string
      description: Natural-language work report content.
    report_date:
      type: string
      description: Report date in YYYY-MM-DD.
    project:
      type: string
      description: Case/project name.
    task_summary:
      type: string
      description: Main work summary.
    hours:
      type: string
      description: Time spent in hours.
    output:
      type: string
      description: Deliverable/result summary.
    risk:
      type: string
      description: Risks/blockers.
action:
  kind: create
  data_source: bitable
  table: {}
  nlp_extract:
    enabled: true
    source_param: query
    date_fields:
      - report_date
    field_patterns:
      report_date:
        - "(?:日期|时间)[:：\\s]*([0-9]{4}[./-][0-9]{1,2}[./-][0-9]{1,2})"
        - "(今天|昨日|昨天)"
      project:
        - "(?:项目|案件)[:：\\s]*([^，,。；;\\n]+)"
      task_summary:
        - "(?:事项|任务|内容)[:：\\s]*([^\\n]+)"
      hours:
        - "(?:耗时|工时|时长)[:：\\s]*([0-9]+(?:\\.[0-9]+)?)"
        - "([0-9]+(?:\\.[0-9]+)?)\\s*(?:小时|h|H)"
      output:
        - "(?:产出|结果|完成)[:：\\s]*([^\\n]+)"
      risk:
        - "(?:风险|阻塞|问题)[:：\\s]*([^\\n]+)"
    strip_patterns:
      - "(?:今天|昨日|昨天)?\\s*(?:工作)?(?:汇报|日报|周报)"
      - "(?:日期|时间)[:：]?\\s*[0-9]{4}[./-][0-9]{1,2}[./-][0-9]{1,2}"
      - "(?:项目|案件)[:：]?\\s*[^，,。；;\\n]+"
      - "(?:耗时|工时|时长)[:：]?\\s*[0-9]+(?:\\.[0-9]+)?\\s*(?:小时|h|H)?"
      - "(?:产出|结果|完成)[:：]?\\s*[^\\n]+"
      - "(?:风险|阻塞|问题)[:：]?\\s*[^\\n]+"
  args:
    fields:
      汇报日期: "{{ params.report_date }}"
      项目: "{{ params.project }}"
      工作内容: "{{ params.task_summary }}"
      耗时小时: "{{ params.hours }}"
      工作产出: "{{ params.output }}"
      风险阻塞: "{{ params.risk }}"
      原始汇报: "{{ params.query }}"
response:
  confirm_required: true
  confirm_respect_preference: true
  output_policy:
    max_chars: 1200
error:
  upstream_error_message: Work report write failed.
  retryable: true
