skills:
  - id: case_search
    description: Search case records by keyword and structured filters.
  - id: case_detail
    description: Fetch full case profile plus related tasks and contracts.
  - id: deadline_overview
    description: Aggregate upcoming deadlines across case and contract data.
  - id: contract_search
    description: Search contract records by vendor, status, and value.
  - id: task_search
    description: Search task records by case context, assignee, and due date.
  - id: task_update
    description: Update task owner/assignee/status with two-step confirmation.
  - id: doc_recognize
    description: Recognize uploaded documents and extract key fields with write-confirm flow.
  - id: reminder_set
    description: Create a personal reminder with best-effort table/calendar/cron bridges.
  - id: reminder_list
    description: List active reminders for current user with status fields.
  - id: reminder_cancel
    description: Cancel reminder by id while keeping record-first semantics.
  - id: daily_summary
    description: Build a daily summary from active reminders for manual or cron delivery.
  - id: work_report_create
    description: Extract natural-language work reports and write them into Bitable with confirmation.
