id: contract_minimal
document_type: contract
fields:
  - name: contract_number
    required: true
    patterns:
      - '(?:contract\s*(?:no|number)?\s*[:#]?\s*)([A-Z0-9\-]{4,})'
  - name: party_a
    required: true
    patterns:
      - '(?:party\s*a\s*[:]?\s*)([^\n]+)'
  - name: party_b
    required: true
    patterns:
      - '(?:party\s*b\s*[:]?\s*)([^\n]+)'
  - name: effective_date
    required: false
    patterns:
      - '(?:effective\s*date\s*[:]?\s*)(\d{4}[./-]\d{1,2}[./-]\d{1,2})'
