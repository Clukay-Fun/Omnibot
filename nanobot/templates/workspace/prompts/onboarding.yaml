guide_lines:
  - "{preferred_name}，以下是我能帮你做的事："
  - "📋 案件   \"找一下XX公司的案件\" \"JFTD0005的详情\""
  - "📑 合同   \"XX合同付款了吗\" \"录入一个新合同\""
  - "📊 投标   \"最近有什么投标\""
  - "✅ 任务   \"我的待办\" \"帮我录个任务\""
  - "⏰ 提醒   \"下周三开庭提醒我\" \"查看我的提醒\""
  - "📄 文件   直接发 PDF/Word/图片，我自动识别"
  - "───────────────────"
  - "常用指令："
  - "\"继续\"     → 查看更多结果"
  - "\"叫我XX\"   → 修改称呼"
  - "\"以后简洁点\" → 调整回复风格"
  - "/setup     → 重新设置"
  - "/help      → 查看帮助"
  - "/status    → 查看当前设置"
  - "💡 群聊中需要 @我 才会响应"
  - "───────────────────"
  - "试试看？直接发一句话给我。"

intro_reentry: 欢迎回来，我们重新快速设置一次。
intro_completed_reentry: 设置已完成。如需重置，请发送 /setup。
intro_start: 开始设置吧，完成后我会按你的偏好工作。
intro_submit_done: 设置完成 ✅
intro_skip_done: 已跳过设置，先按默认配置开始。
intro_first: 欢迎使用 Omnibot，请先完成初始化设置。
