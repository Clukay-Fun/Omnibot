commands_help_text: |
  📖 帮助

  📋 案件管理
    查案件 · 案件详情 · 录入案件 · 修改案件

  📑 合同管理
    查合同 · 合同状态 · 录入合同

  📊 招投标
    查投标 · 录入投标

  ✅ 任务管理
    查任务 · 我的待办 · 录入任务

  ⏰ 提醒
    设置提醒 · 查看提醒 · 取消提醒

  📄 文档
    直接发文件自动识别 · 合同审阅

  ───────────────────

  对话指令：
    "继续"         查看更多结果
    "叫我XX"       修改称呼
    "以后简洁/详细点" 调整回复风格
    "不用确认直接录入" 关闭录入确认

  系统指令：
    /setup   重新设置
    /help    查看帮助
    /status  查看当前设置

session_help_text: |
  会话子命令：

  - /session new [标题]：创建飞书话题会话（缺省为 会话-YYYYMMDD-HHMM）
  - /session list：列出当前聊天下的会话
  - /session del [id|main]：删除当前/指定会话
