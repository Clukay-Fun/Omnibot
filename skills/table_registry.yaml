version: 1
tables:
  case_registry:
    app_token: app_case_mgmt_001
    table_id: tbl_case_registry_001
    field_aliases:
      case_id: 项目ID
      case_no: 案号
      title: 案号
      status: 案件状态
      owner: 主办律师
      client_name: 委托人
      created_at: 创建时间
      updated_at: 更新时间
      next_deadline: 下一节点时间

  case_tasks:
    app_token: app_case_ops_001
    table_id: tbl_case_tasks_001
    field_aliases:
      task_id: 任务ID
      case_id: 项目ID
      task_title: 任务名称
      assignee: 主办律师
      owner: 主办律师
      due_date: 截止时间
      status: 任务状态

  contract_registry:
    app_token: app_contract_ops_001
    table_id: tbl_contract_registry_001
    field_aliases:
      contract_id: 合同ID
      case_id: 项目ID
      contract_no: 合同编号
      title: 合同名称
      vendor: 乙方
      amount: 合同金额
      status: 合同状态
      expiry_date: 到期时间
      renewal_deadline: 续签截止时间
